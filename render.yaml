services:
  - type: web
    name: lab-report-backend
    runtime: python
    rootDir: backend
    buildCommand: |
      apt-get update
      apt-get install -y build-essential python3-dev
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONUNBUFFERED
        value: "true"